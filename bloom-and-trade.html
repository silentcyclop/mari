/* =========================================================
   JSONBin connection — paste your Bin ID + X-Master-Key here
   (or fill them in via the Settings gear panel inside the app)
   Create a bin at https://jsonbin.io with initial content:
   {"rules":[],"entries":[],"screenshots":[]}
   ========================================================= */
const JSONBIN_CONFIG = {
  binId: "",
  apiKey: "",
};

async function jbGet(binId, apiKey) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { "X-Master-Key": apiKey, "X-Bin-Meta": "false" },
  });
  if (!res.ok) throw new Error(`Could not load bin (status ${res.status})`);
  return res.json();
}
async function jbPut(binId, apiKey, data) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": apiKey },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error(`Could not save (status ${res.status})`);
  return res.json();
}

function uid() {
  return `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}
function nowLocalInputValue() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 16);
}
function compressImage(file, maxDim = 640, quality = 0.55) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load image"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- Icons (hand-drawn, no external icon library) ---------------- */
function Icon({ name, size = 16, color = "currentColor", style }) {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", style };
  switch (name) {
    case "plus": return <svg {...common}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
    case "x": return <svg {...common}><line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" /></svg>;
    case "trash": return <svg {...common}><polyline points="4,7 20,7" /><path d="M6 7l1 13h10l1-13" /><path d="M9 7V4h6v3" /></svg>;
    case "chevronDown": return <svg {...common}><polyline points="6,9 12,15 18,9" /></svg>;
    case "chevronUp": return <svg {...common}><polyline points="6,15 12,9 18,15" /></svg>;
    case "arrowUp": return <svg {...common}><line x1="12" y1="19" x2="12" y2="5" /><polyline points="6,11 12,5 18,11" /></svg>;
    case "arrowDown": return <svg {...common}><line x1="12" y1="5" x2="12" y2="19" /><polyline points="6,13 12,19 18,13" /></svg>;
    case "book": return <svg {...common}><path d="M4 5c3 0 6 1 8 3v11c-2-2-5-3-8-3z" /><path d="M20 5c-3 0-6 1-8 3v11c2-2 5-3 8-3z" /></svg>;
    case "listChecks": return <svg {...common}><polyline points="3,7 5,9 9,5" /><line x1="12" y1="7" x2="21" y2="7" /><polyline points="3,14 5,16 9,12" /><line x1="12" y1="14" x2="21" y2="14" /></svg>;
    case "camera": return <svg {...common}><path d="M4 8h3l2-3h6l2 3h3v11H4z" /><circle cx="12" cy="13" r="3.5" /></svg>;
    case "settings": return <svg {...common}><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" /></svg>;
    case "search": return <svg {...common}><circle cx="10" cy="10" r="6" /><line x1="15" y1="15" x2="20" y2="20" /></svg>;
    case "flame": return <svg {...common}><path d="M12 2c2 4-2 5-2 8a4 4 0 0 0 8 0c0-2-1-3-1-5 3 2 4 5 4 8a8 8 0 0 1-16 0c0-5 3-7 7-11z" /></svg>;
    case "image": return <svg {...common}><rect x="3" y="4" width="18" height="16" rx="2" /><circle cx="8.5" cy="9.5" r="1.5" /><path d="M21 15l-5-5-4 4-3-3-5 5" /></svg>;
    case "calculator": return <svg {...common}><rect x="5" y="3" width="14" height="18" rx="2" /><line x1="8" y1="7" x2="16" y2="7" /><circle cx="8" cy="11.5" r="1" fill={color} stroke="none" /><circle cx="12" cy="11.5" r="1" fill={color} stroke="none" /><circle cx="16" cy="11.5" r="1" fill={color} stroke="none" /><circle cx="8" cy="15.5" r="1" fill={color} stroke="none" /><circle cx="12" cy="15.5" r="1" fill={color} stroke="none" /><circle cx="16" cy="15.5" r="1" fill={color} stroke="none" /></svg>;
    case "alert": return <svg {...common}><circle cx="12" cy="12" r="9" /><line x1="12" y1="7" x2="12" y2="13" /><circle cx="12" cy="16.3" r="0.6" fill={color} stroke="none" /></svg>;
    case "loader": return <svg {...common} className="spin"><circle cx="12" cy="12" r="9" strokeOpacity="0.25" /><path d="M21 12a9 9 0 0 0-9-9" /></svg>;
    default: return null;
  }
}

/* ---------------- Equity curve (custom, no chart library) ---------------- */
function EquityChart({ points }) {
  const width = 300, height = 110, padTop = 10, padBottom = 16, padLeft = 8, padRight = 8;
  if (!points.length) return null;
  const ys = points.map((p) => p.y);
  const minY = Math.min(0, ...ys), maxY = Math.max(0, ...ys);
  const rangeY = (maxY - minY) || 1;
  const xs = points.map((p) => p.x);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const rangeX = (maxX - minX) || 1;
  const scaleX = (x) => padLeft + ((x - minX) / rangeX) * (width - padLeft - padRight);
  const scaleY = (y) => height - padBottom - ((y - minY) / rangeY) * (height - padTop - padBottom);
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${scaleX(p.x).toFixed(1)} ${scaleY(p.y).toFixed(1)}`).join(" ");
  const zeroY = scaleY(0);
  const last = points[points.length - 1];
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <line x1={padLeft} y1={zeroY} x2={width - padRight} y2={zeroY} stroke={C.hairline} strokeWidth="1" />
      <path d={path} fill="none" stroke={C.rose} strokeWidth="2" />
      <circle cx={scaleX(last.x)} cy={scaleY(last.y)} r="3" fill={C.rose} />
    </svg>
  );
}

/* =========================== APP =========================== */
function TradeJournal() {
  const [tab, setTab] = useState("log");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [config, setConfig] = useState({ binId: JSONBIN_CONFIG.binId, apiKey: JSONBIN_CONFIG.apiKey });
  const [tmpConfig, setTmpConfig] = useState(config);

  const [data, setData] = useState({ rules: DEFAULT_RULES.map((t) => ({ id: uid(), text: t })), entries: [], screenshots: [] });
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const configured = config.binId && config.apiKey;

  useEffect(() => { if (configured) loadAll(); else setLoading(false); }, [config.binId, config.apiKey]);

  async function loadAll() {
    setLoading(true); setError("");
    try {
      const res = await jbGet(config.binId, config.apiKey);
      const rec = res.record || {};
      const next = {
        rules: rec.rules && rec.rules.length ? rec.rules : DEFAULT_RULES.map((t) => ({ id: uid(), text: t })),
        entries: rec.entries || [],
        screenshots: rec.screenshots || [],
      };
      setData(next);
      if (!rec.rules) await jbPut(config.binId, config.apiKey, next);
    } catch (e) {
      setError(e.message || "Could not connect to JSONBin");
    }
    setLoading(false);
  }

  async function persist(next) {
    setData(next);
    setSaving(true);
    try {
      await jbPut(config.binId, config.apiKey, next);
    } catch (e) {
      setError(e.message || "Save failed — check your connection");
    }
    setSaving(false);
  }

  function saveSettings() { setConfig(tmpConfig); setSettingsOpen(false); }

  function addRule() { persist({ ...data, rules: [...data.rules, { id: uid(), text: "" }] }); }
  function updateRuleLocal(id, text) { setData((d) => ({ ...d, rules: d.rules.map((r) => (r.id === id ? { ...r, text } : r)) })); }
  function commitRule(id, text) { persist({ ...data, rules: data.rules.map((r) => (r.id === id ? { ...r, text } : r)) }); }
  function deleteRule(id) { persist({ ...data, rules: data.rules.filter((r) => r.id !== id) }); }
  function moveRule(id, dir) {
    const i = data.rules.findIndex((r) => r.id === id);
    const j = i + dir;
    if (j < 0 || j >= data.rules.length) return;
    const next = [...data.rules];
    [next[i], next[j]] = [next[j], next[i]];
    persist({ ...data, rules: next });
  }

  async function addEntry(entry) { await persist({ ...data, entries: [entry, ...data.entries] }); }
  async function deleteEntry(id) { await persist({ ...data, entries: data.entries.filter((e) => e.id !== id) }); setConfirmDeleteId(null); }

  async function addScreenshots(items) { await persist({ ...data, screenshots: [...items, ...data.screenshots] }); }
  async function deleteScreenshot(id) { await persist({ ...data, screenshots: data.screenshots.filter((s) => s.id !== id) }); }

  const stats = useMemo(() => computeStats(data.entries), [data.entries]);

  if (!configured) {
    return <SetupScreen tmpConfig={tmpConfig} setTmpConfig={setTmpConfig} onSave={saveSettings} />;
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Quicksand', sans-serif" }}>
      <div style={{ maxWidth: 460, margin: "0 auto", paddingBottom: 92, minHeight: "100vh", position: "relative" }}>
        <div style={{ padding: "26px 20px 16px", borderBottom: `1px solid ${C.hairline}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic", fontWeight: 600, fontSize: 30, color: C.roseDeep }}>Bloom &amp; Trade</div>
            <div style={{ fontSize: 11.5, color: C.textFaint, letterSpacing: 1.4, marginTop: 2, fontWeight: 600 }}>ICT TRADING JOURNAL {saving && "· saving…"}</div>
          </div>
          <button onClick={() => { setTmpConfig(config); setSettingsOpen(true); }} style={{ background: C.surfaceAlt, border: `1px solid ${C.hairline}`, borderRadius: 10, padding: 8, color: C.roseDeep }}>
            <Icon name="settings" size={16} />
          </button>
        </div>

        {error && (
          <div style={{ margin: "14px 20px 0", background: "#FBE4E8", border: `1px solid ${C.lossSoft}`, borderRadius: 10, padding: "10px 12px", color: C.roseDeep, fontSize: 12.5, display: "flex", gap: 8, alignItems: "flex-start" }}>
            <Icon name="alert" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
            <span>{error}</span>
          </div>
        )}

        {loading ? (
          <div style={{ display: "flex", justifyContent: "center", padding: 60 }}>
            <Icon name="loader" size={22} color={C.rose} />
          </div>
        ) : (
          <>
            {tab === "log" && (
              <LogView data={data} stats={stats} expandedId={expandedId} setExpandedId={setExpandedId}
                confirmDeleteId={confirmDeleteId} setConfirmDeleteId={setConfirmDeleteId} deleteEntry={deleteEntry}
                goNew={() => setTab("new")} />
            )}
            {tab === "new" && (
              <NewEntryView rules={data.rules} onSave={async (entry) => { await addEntry(entry); setTab("log"); }} />
            )}
            {tab === "gallery" && (
              <GalleryView screenshots={data.screenshots} addScreenshots={addScreenshots} deleteScreenshot={deleteScreenshot} />
            )}
            {tab === "rules" && (
              <RulesView rules={data.rules} addRule={addRule} updateRule={updateRuleLocal} commitRule={commitRule} deleteRule={deleteRule} moveRule={moveRule} />
            )}
          </>
        )}

        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,246,244,0.94)", backdropFilter: "blur(10px)", borderTop: `1px solid ${C.hairline}` }}>
          <div style={{ maxWidth: 460, margin: "0 auto", display: "flex" }}>
            <TabBtn active={tab === "log"} onClick={() => setTab("log")} icon={<Icon name="book" size={17} />} label="Journal" />
            <TabBtn active={tab === "new"} onClick={() => setTab("new")} icon={<Icon name="plus" size={17} />} label="New" />
            <TabBtn active={tab === "gallery"} onClick={() => setTab("gallery")} icon={<Icon name="image" size={17} />} label="Gallery" />
            <TabBtn active={tab === "rules"} onClick={() => setTab("rules")} icon={<Icon name="listChecks" size={17} />} label="Rules" />
          </div>
        </div>
      </div>

      {settingsOpen && (
        <SettingsModal tmpConfig={tmpConfig} setTmpConfig={setTmpConfig} onSave={saveSettings} onClose={() => setSettingsOpen(false)} />
      )}
    </div>
  );
}

function computeStats(entries) {
  const total = entries.length;
  const wins = entries.filter((e) => e.resultType === "win").length;
  const losses = entries.filter((e) => e.resultType === "loss").length;
  const winRate = wins + losses > 0 ? Math.round((wins / (wins + losses)) * 100) : null;
  const rValues = entries.map((e) => parseFloat(e.rMultiple)).filter((n) => !isNaN(n));
  const avgR = rValues.length ? (rValues.reduce((a, b) => a + b, 0) / rValues.length).toFixed(2) : null;
  const adherent = entries.filter((e) => e.checklist && e.checklist.length && e.checklist.every((c) => c.checked)).length;
  const adherencePct = total ? Math.round((adherent / total) * 100) : null;

  let streak = 0, streakType = null;
  const sorted = [...entries].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
  for (const e of sorted) {
    if (e.resultType !== "win" && e.resultType !== "loss") continue;
    if (streakType === null) { streakType = e.resultType; streak = 1; }
    else if (e.resultType === streakType) streak++;
    else break;
  }

  const byPair = {}, bySetup = {};
  entries.forEach((e) => {
    const r = parseFloat(e.rMultiple);
    if (isNaN(r)) return;
    if (e.pair) { byPair[e.pair] = byPair[e.pair] || { sum: 0, n: 0 }; byPair[e.pair].sum += r; byPair[e.pair].n++; }
    if (e.setupType) { bySetup[e.setupType] = bySetup[e.setupType] || { sum: 0, n: 0 }; bySetup[e.setupType].sum += r; bySetup[e.setupType].n++; }
  });
  const bestPair = Object.entries(byPair).sort((a, b) => b[1].sum - a[1].sum)[0];
  const worstPair = Object.entries(byPair).sort((a, b) => a[1].sum - b[1].sum)[0];
  const bestSetup = Object.entries(bySetup).sort((a, b) => b[1].sum - a[1].sum)[0];

  const chrono = [...entries].filter((e) => !isNaN(parseFloat(e.rMultiple))).sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
  let cum = 0;
  const curve = chrono.map((e, i) => { cum += parseFloat(e.rMultiple); return { x: i + 1, y: parseFloat(cum.toFixed(2)) }; });

  return { total, wins, losses, winRate, avgR, adherencePct, streak, streakType, bestPair, worstPair, bestSetup, curve };
}

function TabBtn({ active, onClick, icon, label }) {
  return (
    <button onClick={onClick} style={{ flex: 1, padding: "11px 0 13px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: active ? C.rose : C.textFaint, background: "none", border: "none" }}>
      {icon}<span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.4 }}>{label}</span>
    </button>
  );
}

      <div style={{ maxWidth: 380, width: "100%" }}>
        <div style={{ fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic", fontSize: 32, color: C.roseDeep, textAlign: "center", marginBottom: 6 }}>Bloom &amp; Trade</div>
        <div style={{ textAlign: "center", fontSize: 12.5, color: C.textMuted, marginBottom: 26, lineHeight: 1.5 }}>
          Connect your JSONBin so your journal saves to your own storage.<br />
          Create a free bin at <span style={{ color: C.roseDeep, fontWeight: 600 }}>jsonbin.io</span> with content:<br />
          <code style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5 }}>{`{"rules":[],"entries":[],"screenshots":[]}`}</code>
        </div>
        <ConfigForm tmpConfig={tmpConfig} setTmpConfig={setTmpConfig} />
        <button onClick={onSave} disabled={!tmpConfig.binId || !tmpConfig.apiKey} style={{
          width: "100%", background: C.rose, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0",
          fontSize: 14.5, fontWeight: 700, fontFamily: "'Quicksand', sans-serif", opacity: (!tmpConfig.binId || !tmpConfig.apiKey) ? 0.5 : 1,
        }}>Connect</button>
      </div>
    </div>
  );
}
function ConfigForm({ tmpConfig, setTmpConfig }) {

function EntryCard({ e, expanded, onToggle, confirmDelete, onAskDelete, onCancelDelete, onDelete }) {
  const checklist = e.checklist || [];
  const followedAll = checklist.length > 0 && checklist.every((c) => c.checked);
  const missed = checklist.filter((c) => !c.checked).length;
  const rColor = e.resultType === "win" ? C.win : e.resultType === "loss" ? C.loss : C.gold;
  const d = new Date(e.datetime);
  const dateStr = isNaN(d) ? e.datetime : d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  const timeStr = isNaN(d) ? "" : d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });

  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
      <div style={{ paddingTop: 2 }}><HeartSeal type={e.resultType === "win" ? "win" : e.resultType === "loss" ? "loss" : "be"} /></div>
      <div style={{ flex: 1, background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 14, padding: "13px 14px", cursor: "pointer", boxShadow: "0 1px 8px rgba(184,56,95,0.05)" }} onClick={onToggle}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 14.5, fontWeight: 700 }}>{e.pair}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, color: C.textFaint, marginTop: 2 }}>{dateStr} · {timeStr}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, color: rColor, fontWeight: 700 }}>
              {e.rMultiple !== "" && e.rMultiple !== undefined ? `${e.rMultiple}R` : e.resultType.toUpperCase()}
            </div>
            <Icon name={expanded ? "chevronUp" : "chevronDown"} size={15} color={C.textFaint} />
          </div>
        </div>
        {e.setupType && <div style={{ fontSize: 12.5, color: C.textMuted, marginTop: 6 }}>{e.setupType}</div>}
        <div style={{ display: "inline-block", marginTop: 8, fontSize: 10, letterSpacing: 0.4, fontWeight: 700, color: followedAll ? C.win : C.loss, border: `1px solid ${followedAll ? C.winSoft : C.lossSoft}`, borderRadius: 999, padding: "2px 9px" }}>
          {followedAll ? "RULES FOLLOWED" : `${missed} RULE${missed === 1 ? "" : "S"} MISSED`}
        </div>

        {expanded && (
          <div onClick={(ev) => ev.stopPropagation()} style={{ marginTop: 14, borderTop: `1px solid ${C.hairline}`, paddingTop: 14 }}>
            {e.why && <Detail label="Why I entered" value={e.why} />}
            {checklist.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <SectionLabel>Checklist</SectionLabel>
                {checklist.map((c, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, fontSize: 13, marginBottom: 5, color: c.checked ? C.text : C.textFaint }}>
                    <span style={{ color: c.checked ? C.win : C.loss }}>{c.checked ? "✓" : "✕"}</span><span>{c.text}</span>
                  </div>
                ))}
              </div>
            )}
            {e.feelings && e.feelings.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <SectionLabel>How I felt</SectionLabel>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {e.feelings.map((f) => <span key={f} style={{ fontSize: 11, border: `1px solid ${C.hairline}`, borderRadius: 999, padding: "3px 10px", color: C.textMuted }}>{f}</span>)}
                </div>
              </div>
            )}
            {e.notes && <Detail label="Notes" value={e.notes} />}
            {e.photos && e.photos.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <SectionLabel>Screenshots</SectionLabel>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {e.photos.map((p, i) => <img key={i} src={p} alt="" style={{ width: 88, height: 88, objectFit: "cover", borderRadius: 10, border: `1px solid ${C.hairline}` }} />)}
                </div>
              </div>
            )}
            {!confirmDelete ? (
              <button onClick={onAskDelete} style={{ display: "flex", alignItems: "center", gap: 6, color: C.loss, fontSize: 12.5, background: "none", border: "none", padding: 0, fontWeight: 600 }}>
                <Icon name="trash" size={13} /> Delete entry
              </button>
            ) : (
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <span style={{ fontSize: 12.5, color: C.textMuted }}>Delete this trade?</span>
                <button onClick={onDelete} style={{ color: C.loss, fontSize: 12.5, background: "none", border: "none", fontWeight: 700 }}>Yes</button>
                <button onClick={onCancelDelete} style={{ color: C.textFaint, fontSize: 12.5, background: "none", border: "none" }}>Cancel</button>

      </div>

  return <div style={{ marginBottom: 14 }}><SectionLabel>{label}</SectionLabel><div style={{ fontSize: 13.5, lineHeight: 1.5 }}>{value}</div></div>;

/* ---------------- New Entry View (with risk calculator) ---------------- */
function NewEntryView({ rules, onSave }) {
  const [form, setForm] = useState({
    datetime: nowLocalInputValue(), pair: "XAU/USD", setupType: "",
    checklist: rules.map((r) => ({ text: r.text, checked: false })),

  });
  const [saving, setSaving] = useState(false);
  const [calcOpen, setCalcOpen] = useState(false);
  const fileInputRef = useRef(null);
  const checkedCount = form.checklist.filter((c) => c.checked).length;

  async function handlePhotoUpload(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      const compressed = await Promise.all(files.map((f) => compressImage(f)));
      setForm((f) => ({ ...f, photos: [...f.photos, ...compressed] }));
    } catch (err) { console.error(err); }
    if (fileInputRef.current) fileInputRef.current.value = "";
  }
  function removePhoto(idx) { setForm((f) => ({ ...f, photos: f.photos.filter((_, i) => i !== idx) })); }
  function toggleFeeling(feel) { setForm((f) => ({ ...f, feelings: f.feelings.includes(feel) ? f.feelings.filter((x) => x !== feel) : [...f.feelings, feel] })); }
  function toggleChecklistItem(idx) { setForm((f) => ({ ...f, checklist: f.checklist.map((c, i) => (i === idx ? { ...c, checked: !c.checked } : c)) })); }

  async function handleSave() {
    if (!form.pair.trim()) return;
    setSaving(true);
    await onSave({ id: uid(), ...form, savedAt: new Date().toISOString() });
    setSaving(false);
  }

  return (
    <div style={{ padding: "20px 20px 0" }}>
      <RiskCalculator open={calcOpen} setOpen={setCalcOpen} />

      <SectionLabel>When &amp; Pair</SectionLabel>

      <TextField label="Pair" value={form.pair} onChange={(v) => setForm((f) => ({ ...f, pair: v }))} placeholder="XAU/USD" />
      <TextField label="Setup type" value={form.setupType} onChange={(v) => setForm((f) => ({ ...f, setupType: v }))} placeholder="Liquidity sweep + FVG" />

      <SectionLabel>Checklist ({checkedCount}/{form.checklist.length})</SectionLabel>
      <div style={{ background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 14, padding: "6px 14px", marginBottom: 20 }}>
        {form.checklist.map((c, i) => (
          <label key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "9px 0", borderBottom: i < form.checklist.length - 1 ? `1px solid ${C.hairline}` : "none", fontSize: 13.5, cursor: "pointer" }}>
            <input type="checkbox" checked={c.checked} onChange={() => toggleChecklistItem(i)} style={{ marginTop: 2, accentColor: C.rose }} />
            <span style={{ color: c.checked ? C.text : C.textMuted }}>{c.text}</span>
          </label>
        ))}
      </div>

      <SectionLabel>Screenshots</SectionLabel>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
        {form.photos.map((p, i) => (
          <div key={i} style={{ position: "relative" }}>
            <img src={p} alt="" style={{ width: 76, height: 76, objectFit: "cover", borderRadius: 10, border: `1px solid ${C.hairline}` }} />
            <button onClick={() => removePhoto(i)} style={{ position: "absolute", top: -6, right: -6, background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: "50%", width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", color: C.loss }}><Icon name="x" size={12} /></button>
          </div>
        ))}
        <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ width: 76, height: 76, borderRadius: 10, border: `1px dashed ${C.hairline}`, background: "none", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: C.roseSoft, gap: 4 }}>
          <Icon name="camera" size={18} /><span style={{ fontSize: 9 }}>Add</span>
        </button>
        <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handlePhotoUpload} style={{ display: "none" }} />
      </div>

      <TextField label="Why I entered" area value={form.why} onChange={(v) => setForm((f) => ({ ...f, why: v }))} placeholder="What I saw on the chart, why this was the trade" />

      <SectionLabel>Result</SectionLabel>
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {["win", "loss", "be"].map((t) => (
          <button key={t} onClick={() => setForm((f) => ({ ...f, resultType: t }))} style={{
            flex: 1, padding: "9px 0", borderRadius: 10, fontSize: 13, fontWeight: 700,
            border: `1px solid ${form.resultType === t ? C.rose : C.hairline}`,
            background: form.resultType === t ? "rgba(184,56,95,0.08)" : "transparent",
            color: form.resultType === t ? C.roseDeep : C.textMuted,
          }}>{t === "win" ? "Win" : t === "loss" ? "Loss" : "Breakeven"}</button>
        ))}
      </div>
      <TextField label="R multiple" type="number" value={form.rMultiple} onChange={(v) => setForm((f) => ({ ...f, rMultiple: v }))} placeholder="e.g. 2, -1, 0" />

      <SectionLabel>How I felt</SectionLabel>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 20 }}>
        {FEELINGS.map((f) => <Chip key={f} active={form.feelings.includes(f)} onClick={() => toggleFeeling(f)}>{f}</Chip>)}
      </div>

      <TextField label="Notes" area value={form.notes} onChange={(v) => setForm((f) => ({ ...f, notes: v }))} placeholder="Anything else worth remembering" />

      <button onClick={handleSave} disabled={saving || !form.pair.trim()} style={{
        width: "100%", background: C.rose, color: "#fff", border: "none", borderRadius: 14, padding: "13px 0",
        fontSize: 14.5, fontWeight: 700, marginBottom: 30, opacity: saving ? 0.6 : 1,
      }}>{saving ? "Saving…" : "Save Trade"}</button>
    </div>
  );
}

function RiskCalculator({ open, setOpen }) {
  const [balance, setBalance] = useState("");
  const [riskPct, setRiskPct] = useState("1");
  const [entry, setEntry] = useState("");
  const [stop, setStop] = useState("");

  const riskAmount = balance && riskPct ? (parseFloat(balance) * (parseFloat(riskPct) / 100)) : null;
  const stopDistance = entry && stop ? Math.abs(parseFloat(entry) - parseFloat(stop)) : null;
  const units = riskAmount && stopDistance ? riskAmount / stopDistance : null;

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 14, marginBottom: 20, overflow: "hidden" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", padding: "13px 14px", background: "none", border: "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 700, fontSize: 13.5, color: C.roseDeep }}>
          <Icon name="calculator" size={15} /> Position Size Calculator
        </span>
        <Icon name={open ? "chevronUp" : "chevronDown"} size={15} color={C.textFaint} />
      </button>
      {open && (
        <div style={{ padding: "0 14px 16px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <TextField label="Account balance" type="number" value={balance} onChange={setBalance} placeholder="181.19" />
            <TextField label="Risk %" type="number" value={riskPct} onChange={setRiskPct} placeholder="1" />
            <TextField label="Entry price" type="number" value={entry} onChange={setEntry} placeholder="4042.03" />
            <TextField label="Stop price" type="number" value={stop} onChange={setStop} placeholder="3970.43" />
          </div>
          {units !== null && (
            <div style={{ background: C.surfaceAlt, borderRadius: 10, padding: "10px 12px", marginTop: 4 }}>
              <div style={{ fontSize: 11.5, color: C.textMuted }}>Risking <b style={{ color: C.roseDeep }}>${riskAmount.toFixed(2)}</b> over a <b style={{ color: C.roseDeep }}>{stopDistance.toFixed(2)}</b> point stop</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, color: C.rose, marginTop: 4 }}>{units.toFixed(3)} units</div>
              <div style={{ fontSize: 10.5, color: C.textFaint, marginTop: 2 }}>Estimate only — confirm against your broker's exact contract size before entering.</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------------- Screenshot Gallery ---------------- */
function GalleryView({ screenshots, addScreenshots, deleteScreenshot }) {
  const [query, setQuery] = useState("");
  const [activeTag, setActiveTag] = useState(null);
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);
  const [pendingTags, setPendingTags] = useState([]);
  const [pendingNote, setPendingNote] = useState("");
  const [pendingPair, setPendingPair] = useState("XAU/USD");

  async function handleUpload(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setUploading(true);
    try {
      const compressed = await Promise.all(files.map((f) => compressImage(f, 700, 0.5)));
      const items = compressed.map((img) => ({
        id: uid(), image: img, tags: pendingTags, notes: pendingNote, pair: pendingPair,
        date: new Date().toISOString(),
      }));
      await addScreenshots(items);
      setPendingNote("");
    } catch (err) { console.error(err); }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  }

  const filtered = screenshots.filter((s) => {
    const matchesTag = !activeTag || (s.tags || []).includes(activeTag);
    const q = query.trim().toLowerCase();
    const matchesQuery = !q || (s.notes || "").toLowerCase().includes(q) || (s.pair || "").toLowerCase().includes(q) || (s.tags || []).some((t) => t.toLowerCase().includes(q));
    return matchesTag && matchesQuery;
  });

  return (
    <div style={{ padding: "20px 20px 0" }}>
      <SectionLabel>Add screenshots</SectionLabel>
      <div style={{ background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 14, padding: 14, marginBottom: 22 }}>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8 }}>Tag before uploading — applies to all photos in this batch</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
          {SCREENSHOT_TAGS.map((t) => (
            <Chip key={t} active={pendingTags.includes(t)} onClick={() => setPendingTags((p) => p.includes(t) ? p.filter((x) => x !== t) : [...p, t])}>{t}</Chip>
          ))}
        </div>
        <TextField label="Pair" value={pendingPair} onChange={setPendingPair} placeholder="XAU/USD" />
        <TextField label="Note" value={pendingNote} onChange={setPendingNote} placeholder="What this shows" />
        <button onClick={() => fileInputRef.current && fileInputRef.current.click()} disabled={uploading} style={{
          width: "100%", background: C.rose, color: "#fff", border: "none", borderRadius: 12, padding: "11px 0",
          fontWeight: 700, fontSize: 13.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, opacity: uploading ? 0.6 : 1,
        }}>
          <Icon name="camera" size={15} /> {uploading ? "Uploading…" : "Upload screenshots"}
        </button>
        <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleUpload} style={{ display: "none" }} />
      </div>

      <SectionLabel>Browse</SectionLabel>
      <div style={{ position: "relative", marginBottom: 10 }}>
        <span style={{ position: "absolute", left: 12, top: 11 }}><Icon name="search" size={14} color={C.textFaint} /></span>
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search notes, pair, tag…" style={{
          width: "100%", padding: "9px 12px 9px 32px", borderRadius: 12, border: `1px solid ${C.hairline}`,
          background: C.surfaceAlt, color: C.text, fontSize: 13.5, boxSizing: "border-box", outline: "none",
        }} />
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
        <Chip active={!activeTag} onClick={() => setActiveTag(null)}>All</Chip>
        {SCREENSHOT_TAGS.map((t) => <Chip key={t} active={activeTag === t} onClick={() => setActiveTag(activeTag === t ? null : t)}>{t}</Chip>)}
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 20px", color: C.textFaint, fontSize: 13 }}>No screenshots match yet.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
          {filtered.map((s) => <GalleryCard key={s.id} s={s} onDelete={() => deleteScreenshot(s.id)} />)}
        </div>
      )}
    </div>
  );
}
function GalleryCard({ s, onDelete }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 12, overflow: "hidden" }}>
      <img src={s.image} alt="" onClick={() => setOpen(!open)} style={{ width: "100%", height: 110, objectFit: "cover", cursor: "pointer" }} />
      <div style={{ padding: "8px 10px" }}>
        <div style={{ fontSize: 11.5, fontWeight: 700, color: C.roseDeep }}>{s.pair}</div>
        {s.tags && s.tags.length > 0 && <div style={{ fontSize: 9.5, color: C.textFaint, marginTop: 2 }}>{s.tags.slice(0, 2).join(", ")}{s.tags.length > 2 ? "…" : ""}</div>}
        {open && (
          <>
            {s.notes && <div style={{ fontSize: 11, color: C.textMuted, marginTop: 6 }}>{s.notes}</div>}
            <button onClick={onDelete} style={{ marginTop: 8, background: "none", border: "none", color: C.loss, fontSize: 11, display: "flex", alignItems: "center", gap: 4, padding: 0, fontWeight: 600 }}>
              <Icon name="trash" size={11} /> Delete
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ---------------- Rules View ---------------- */
function RulesView({ rules, addRule, updateRule, commitRule, deleteRule, moveRule }) {
  return (
    <div style={{ padding: "20px 20px 0" }}>
      <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.5, marginBottom: 20 }}>
        Your checklist template — edit anytime. Every new trade pulls from what's here.
      </div>
      <div style={{ background: C.surface, border: `1px solid ${C.hairline}`, borderRadius: 14, padding: "6px 10px", marginBottom: 16 }}>
        {rules.map((r, i) => (
          <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "9px 4px", borderBottom: i < rules.length - 1 ? `1px solid ${C.hairline}` : "none" }}>
            <div style={{ display: "flex", flexDirection: "column" }}>
              <button onClick={() => moveRule(r.id, -1)} disabled={i === 0} style={{ background: "none", border: "none", color: i === 0 ? C.hairline : C.textFaint, padding: 0 }}><Icon name="arrowUp" size={11} /></button>
              <button onClick={() => moveRule(r.id, 1)} disabled={i === rules.length - 1} style={{ background: "none", border: "none", color: i === rules.length - 1 ? C.hairline : C.textFaint, padding: 0 }}><Icon name="arrowDown" size={11} /></button>
            </div>
            <input value={r.text} onChange={(e) => updateRule(r.id, e.target.value)} onBlur={(e) => commitRule(r.id, e.target.value)}
              style={{ flex: 1, background: "none", border: "none", color: C.text, fontSize: 13.5, outline: "none" }} />
            <button onClick={() => deleteRule(r.id)} style={{ background: "none", border: "none", color: C.textFaint }}><Icon name="x" size={14} /></button>
          </div>
        ))}
        {rules.length === 0 && <div style={{ padding: "16px 4px", color: C.textFaint, fontSize: 13 }}>No rules yet — add your first below.</div>}
      </div>
      <button onClick={addRule} style={{ display: "flex", alignItems: "center", gap: 6, color: C.roseDeep, background: "none", border: `1px dashed ${C.hairline}`, borderRadius: 12, padding: "10px 14px", fontSize: 13, width: "100%", justifyContent: "center", marginBottom: 30, fontWeight: 700 }}>
        <Icon name="plus" size={14} /> Add rule
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TradeJournal />);
</script>
</body>
</html>
